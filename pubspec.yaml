name: firecheck
description: FireCheck Mobile — attribution and household survey for fire-risk modeling.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # state
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # routing
  go_router: ^14.2.0

  # persistence
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # remote
  supabase_flutter: ^2.5.6

  # map
  mapbox_maps_flutter: ^2.5.0

  # platform
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  geolocator: ^13.0.0

  # utilities
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0

  # media
  image_picker: ^1.1.0
  image: ^4.2.0
  native_exif: ^0.6.0

  # sync engine
  connectivity_plus: ^5.0.0
  workmanager: ^0.9.0
  archive: ^3.4.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
